<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Footlab Turf | Gallery</title>

  <header class="site-header">

            <img src="images/gallery/turf 9.jpeg" alt="Gallery image 9" />

      <div class="footer-links">
